[bumpversion]
current_version = 0.34.0
commit = True
tag = True

[bumpversion:file:pyproject.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:README.md]
search = Version: {current_version}
replace = Version: {new_version}

[bumpversion:file(mcp-img):docker/Dockerfile]
search = archivebox-api[mcp]>={current_version}
replace = archivebox-api[mcp]>={new_version}

[bumpversion:file(agent-img):docker/Dockerfile]
search = archivebox-api[agent]>={current_version}
replace = archivebox-api[agent]>={new_version}

[bumpversion:file:archivebox_api/agent_server.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[bumpversion:file:archivebox_api/mcp_server.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"
